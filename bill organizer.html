<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Bill Organizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 20px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
  .month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .month-nav button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; font-size: 14px; cursor: pointer; }
  .month-nav button:hover { background: #f0f0f0; }
  .month-label { font-size: 16px; font-weight: 600; min-width: 150px; text-align: center; }
  .reset-btn { margin-left: auto; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #888; cursor: pointer; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e8; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-value.green { color: #2d7d46; }
  .stat-value.orange { color: #c05c00; font-size: 16px; }
  .progress-wrap { margin-bottom: 20px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px; }
  .progress-track { height: 7px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #2d7d46; border-radius: 4px; transition: width 0.3s; }
  .day-group { margin-bottom: 20px; }
  .day-label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .day-dot { width: 8px; height: 8px; background: #4a7ec7; border-radius: 50%; flex-shrink:0; }
  .bill-row { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; transition: opacity 0.2s; }
  .bill-row.paid { opacity: 0.45; }
  .check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; background: transparent; cursor: pointer; flex-shrink: 0; font-size: 13px; display: flex; align-items: center; justify-content: center; color: #2d7d46; transition: all 0.15s; }
  .check.done { background: #d4edda; border-color: #2d7d46; }
  .bill-info { flex: 1; min-width: 0; }
  .bill-name { font-size: 14px; font-weight: 600; }
  .paid .bill-name { text-decoration: line-through; }
  .bill-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .owed-tag { display: inline-block; background: #fff4e0; color: #9a5c00; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 3px; }
  .bill-amt { font-size: 15px; font-weight: 600; text-align: right; white-space: nowrap; flex-shrink: 0; }
  .bill-amt.approx { color: #888; }
  .set-btn { font-size: 12px; padding: 4px 10px; background: #f5f5f0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; color: #555; white-space: nowrap; }
  .set-btn:hover { background: #eaeae6; }
</style>
</head>
<body>

<h1>&#128176; Bill Organizer</h1>
<p class="subtitle">Check off bills as you pay them each month</p>

<div class="month-nav">
  <button onclick="changeMonth(-1)">&#8592;</button>
  <span class="month-label" id="monthLabel"></span>
  <button onclick="changeMonth(1)">&#8594;</button>
  <button class="reset-btn" onclick="resetMonth()">&#8635; Reset month</button>
</div>

<div class="summary-grid">
  <div class="stat"><div class="stat-label">Total Due</div><div class="stat-value" id="sTotalDue">—</div></div>
  <div class="stat"><div class="stat-label">Paid</div><div class="stat-value green" id="sPaid">—</div></div>
  <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="sLeft">—</div></div>
  <div class="stat"><div class="stat-label">Loan Balances</div><div class="stat-value orange" id="sOwed">—</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-labels"><span id="pText">0 of 8 paid</span><span id="pPct">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
</div>

<div id="billList"></div>

<script>
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var BILLS=[
  {id:'child',      day:1,  name:'Child Support',             icon:'&#128155;', amount:273.65,  approx:false, note:''},
  {id:'tractor',    day:1,  name:'Tractor Supply Loan',       icon:'&#128668;', amount:null,    approx:false, note:'Enter your monthly payment below', owed:4000},
  {id:'home',       day:1,  name:'Home Loan / Mortgage',      icon:'&#127968;', amount:1827.43, approx:false, note:''},
  {id:'pso',        day:29, name:'PSO Utilities',             icon:'&#9889;',   amount:140.55,  approx:true,  note:'Electric/utilities (approximate)'},
  {id:'att',        day:7,  name:'ATT Internet',              icon:'&#127760;', amount:67.84,   approx:false, note:''},
  {id:'firstnet',   day:13, name:'ATT FirstNet',              icon:'&#128241;', amount:null,    approx:false, note:'Click "Set amount" to enter your bill'},
  {id:'progressive',day:14, name:'Progressive Car Insurance', icon:'&#128663;', amount:null,    approx:false, note:'Click "Set amount" to enter your premium'},
  {id:'wellsfargo', day:18, name:'Wells Fargo Credit Card',   icon:'&#128179;', amount:null,    approx:false, note:'Enter your monthly payment below', owed:563.83}
];

var curMonth=new Date().getMonth(), curYear=new Date().getFullYear();
var paid={}, customAmts={}, owedAmt={tractor:4000,wellsfargo:563.83};

function sk(){return 'bills_'+curYear+'_'+curMonth;}
function ak(){return 'amts_'+curYear+'_'+curMonth;}
function ok(){return 'owedAmounts';}

function load(){
  try{paid=JSON.parse(localStorage.getItem(sk())||'{}');}catch(e){paid={};}
  try{customAmts=JSON.parse(localStorage.getItem(ak())||'{}');}catch(e){customAmts={};}
  try{owedAmt=JSON.parse(localStorage.getItem(ok())||'{"tractor":4000,"wellsfargo":563.83}');}catch(e){}
}
function save(){
  localStorage.setItem(sk(),JSON.stringify(paid));
  localStorage.setItem(ak(),JSON.stringify(customAmts));
  localStorage.setItem(ok(),JSON.stringify(owedAmt));
}

function getAmt(b){return customAmts[b.id]!=null?customAmts[b.id]:b.amount;}
function fmt(n){if(n==null)return'—';return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function togglePaid(id){
  paid[id]=!paid[id];
  if(paid[id]){
    var b=BILLS.find(function(x){return x.id===id;});
    var amt=getAmt(b);
    if(b.owed!=null&&amt!=null){owedAmt[id]=Math.max(0,(owedAmt[id]||0)-amt);}
  }
  save();render();
}

function setAmt(id){
  var b=BILLS.find(function(x){return x.id===id;});
  var cur=getAmt(b);
  var v=prompt('Enter monthly payment amount for '+b.name+':',cur!=null?cur:'');
  if(v!==null&&v.trim()!==''){
    var n=parseFloat(v.replace(/[$,]/g,''));
    if(!isNaN(n)){customAmts[id]=n;save();render();}
  }
}

function resetMonth(){paid={};save();render();}

function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  load();render();
}

function render(){
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' '+curYear;

  var totalDue=0,totalPaid=0,paidCount=0;
  BILLS.forEach(function(b){
    var a=getAmt(b);
    if(a!=null)totalDue+=a;
    if(paid[b.id]){if(a!=null)totalPaid+=a;paidCount++;}
  });

  document.getElementById('sTotalDue').textContent=fmt(totalDue);
  document.getElementById('sPaid').textContent=fmt(totalPaid);
  document.getElementById('sLeft').textContent=fmt(totalDue-totalPaid);
  document.getElementById('sOwed').textContent=fmt((owedAmt.tractor||0)+(owedAmt.wellsfargo||0));

  var pct=Math.round(paidCount/BILLS.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=paidCount+' of '+BILLS.length+' paid';
  document.getElementById('pPct').textContent=pct+'%';

  var grouped={};
  BILLS.forEach(function(b){if(!grouped[b.day])grouped[b.day]=[];grouped[b.day].push(b);});

  var ord={1:'1st',7:'7th',13:'13th',14:'14th',18:'18th',29:'29th'};
  var list=document.getElementById('billList');
  list.innerHTML='';

  Object.keys(grouped).sort(function(a,b){return a-b;}).forEach(function(day){
    var grp=document.createElement('div');
    grp.className='day-group';
    grp.innerHTML='<div class="day-label"><span class="day-dot"></span>Due '+ord[day]+' of the month</div>';
    grouped[day].forEach(function(b){
      var isPaid=!!paid[b.id];
      var amt=getAmt(b);
      var owed=b.owed!=null?owedAmt[b.id]:null;
      var amtHtml=amt!=null
        ?'<div class="bill-amt'+(b.approx?' approx':'')+'">'+( b.approx?'~':'')+fmt(amt)+'</div>'
        :'<button class="set-btn" onclick="setAmt(\''+b.id+'\')">Set amount</button>';
      var owedHtml=owed!=null?'<div><span class="owed-tag">Balance owed: '+fmt(owed)+'</span></div>':'';
      var noteHtml=b.note?'<div class="bill-sub">'+b.note+'</div>':'';
      var row=document.createElement('div');
      row.className='bill-row'+(isPaid?' paid':'');
      row.innerHTML=
        '<button class="check '+(isPaid?'done':'')+'" onclick="togglePaid(\''+b.id+'\')" aria-label="'+(isPaid?'Mark unpaid':'Mark paid')+'">'+(isPaid?'&#10003;':'')+'</button>'+
        '<div style="font-size:20px;flex-shrink:0">'+b.icon+'</div>'+
        '<div class="bill-info"><div class="bill-name">'+b.name+'</div>'+noteHtml+owedHtml+'</div>'+
        amtHtml;
      grp.appendChild(row);
    });
    list.appendChild(grp);
  });
}

load();render();
</script>
</body>
</html>
