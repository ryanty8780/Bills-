<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Bill Organizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 20px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
  .month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .month-nav button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; font-size: 14px; cursor: pointer; }
  .month-nav button:hover { background: #f0f0f0; }
  .month-label { font-size: 16px; font-weight: 600; min-width: 150px; text-align: center; }
  .reset-btn { margin-left: auto; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #888; cursor: pointer; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e8; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-value.green { color: #2d7d46; }
  .stat-value.orange { color: #c05c00; font-size: 16px; }
  .progress-wrap { margin-bottom: 20px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px; }
  .progress-track { height: 7px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #2d7d46; border-radius: 4px; transition: width 0.3s; }
  .alert-overdue { background: #fff0f0; border: 1px solid #f5c2c2; color: #c0392b; margin-bottom: 10px; border-radius: 10px; padding: 12px 14px; }
  .alert-soon { background: #fffdf0; border: 1px solid #f0d080; color: #8a6000; margin-bottom: 16px; border-radius: 10px; padding: 12px 14px; }
  .alert-item { font-size: 13px; font-weight: 400; margin-top: 3px; padding-left: 10px; }
  .day-group { margin-bottom: 20px; }
  .day-label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .day-dot { width: 8px; height: 8px; background: #4a7ec7; border-radius: 50%; flex-shrink:0; }
  .day-dot.overdue { background: #c0392b; }
  .day-dot.soon { background: #e0a000; }
  .bill-row { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; transition: opacity 0.2s; }
  .bill-row.paid { opacity: 0.45; }
  .bill-row.overdue { background: #fff0f0; border-color: #f5c2c2; }
  .bill-row.today { background: #faf5ff; border-color: #d8b4fe; }
  .bill-row.soon { background: #fffdf0; border-color: #f0d080; }
  .check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; background: transparent; cursor: pointer; flex-shrink: 0; font-size: 13px; display: flex; align-items: center; justify-content: center; color: #2d7d46; transition: all 0.15s; }
  .check.done { background: #d4edda; border-color: #2d7d46; }
  .bill-info { flex: 1; min-width: 0; }
  .bill-name { font-size: 14px; font-weight: 600; }
  .bill-row.overdue .bill-name { color: #c0392b; }
  .bill-row.overdue .bill-amt { color: #c0392b; }
  .bill-row.today .bill-name { color: #6b21a8; }
  .bill-row.today .bill-amt { color: #6b21a8; }
  .paid .bill-name { text-decoration: line-through; }
  .bill-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .status-tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 3px; }
  .tag-overdue { background: #fde8e8; color: #c0392b; }
  .tag-soon { background: #fff0c0; color: #8a6000; }
  .tag-today { background: #f0eaff; color: #6b21a8; }
  .owed-tag { display: inline-block; background: #fff4e0; color: #9a5c00; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 3px; }
  .bill-amt { font-size: 15px; font-weight: 600; text-align: right; white-space: nowrap; flex-shrink: 0; }
  .bill-amt.approx { color: #888; }
  .set-btn { font-size: 12px; padding: 4px 10px; background: #f5f5f0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; color: #555; white-space: nowrap; }
  .sync-bar { font-size: 12px; color: #888; text-align: center; margin-bottom: 12px; }
  .sync-bar.syncing { color: #4a7ec7; }
  .sync-bar.error { color: #c0392b; }
</style>
</head>
<body>

<h1>&#128176; Bill Organizer</h1>
<p class="subtitle">Check off bills as you pay them each month</p>
<div class="sync-bar" id="syncBar">Loading...</div>

<div class="month-nav">
  <button onclick="changeMonth(-1)">&#8592;</button>
  <span class="month-label" id="monthLabel"></span>
  <button onclick="changeMonth(1)">&#8594;</button>
  <button class="reset-btn" onclick="resetMonth()">&#8635; Reset</button>
</div>

<div class="summary-grid">
  <div class="stat"><div class="stat-label">Total Due</div><div class="stat-value" id="sTotalDue">—</div></div>
  <div class="stat"><div class="stat-label">Paid</div><div class="stat-value green" id="sPaid">—</div></div>
  <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="sLeft">—</div></div>
  <div class="stat"><div class="stat-label">Loan Balances</div><div class="stat-value orange" id="sOwed">—</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-labels"><span id="pText">0 of 8 paid</span><span id="pPct">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
</div>

<div id="alertArea"></div>
<div id="billList"></div>

<script>
var SUPABASE_URL='https://qywqtjcrphrzjuvgkzwl.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5d3F0amNycGhyemp1dmdrendsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzIxNjEsImV4cCI6MjA5NjYwODE2MX0.uxA3T9em7MmI2LtQnrJ_d0c2b05GHJGCj4eRtJVfEFo';

var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var BILLS=[
  {id:'child',      day:1,  name:'Child Support',             icon:'&#128155;', amount:273.65,  approx:false, note:''},
  {id:'tractor',    day:1,  name:'Tractor Supply Loan',       icon:'&#128668;', amount:null,    approx:false, note:'Tap "Set amount" to enter payment', owed:4000},
  {id:'home',       day:1,  name:'Home Loan / Mortgage',      icon:'&#127968;', amount:1827.43, approx:false, note:''},
  {id:'att',        day:7,  name:'ATT Internet',              icon:'&#127760;', amount:67.84,   approx:false, note:''},
  {id:'firstnet',   day:13, name:'ATT FirstNet',              icon:'&#128241;', amount:null,    approx:false, note:'Tap "Set amount" to enter your bill'},
  {id:'progressive',day:14, name:'Progressive Car Insurance', icon:'&#128663;', amount:null,    approx:false, note:'Tap "Set amount" to enter your premium'},
  {id:'wellsfargo', day:18, name:'Wells Fargo Credit Card',   icon:'&#128179;', amount:null,    approx:false, note:'Tap "Set amount" to enter payment', owed:563.83},
  {id:'pso',        day:29, name:'PSO Utilities',             icon:'&#9889;',   amount:140.55,  approx:true,  note:'Electric/utilities (approximate)'}
];

var curMonth=new Date().getMonth(), curYear=new Date().getFullYear();
var paid={}, customAmts={}, owedAmt={tractor:4000,wellsfargo:563.83};

function syncKey(){return 'state_'+curYear+'_'+curMonth;}
function amtKey(){return 'amts_'+curYear+'_'+curMonth;}
function owedKey(){return 'owed';}

function setSyncBar(msg,cls){
  var b=document.getElementById('syncBar');
  b.textContent=msg; b.className='sync-bar'+(cls?' '+cls:'');
}

async function dbGet(key){
  try{
    var r=await fetch(SUPABASE_URL+'/rest/v1/Bills_state?key=eq.'+encodeURIComponent(key)+'&select=value',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    var d=await r.json();
    return d&&d.length>0?JSON.parse(d[0].value):null;
  }catch(e){return null;}
}

async function dbSet(key,value){
  try{
    var existing=await fetch(SUPABASE_URL+'/rest/v1/Bills_state?key=eq.'+encodeURIComponent(key),{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    var ex=await existing.json();
    var method=ex&&ex.length>0?'PATCH':'POST';
    var url=ex&&ex.length>0
      ?SUPABASE_URL+'/rest/v1/Bills_state?key=eq.'+encodeURIComponent(key)
      :SUPABASE_URL+'/rest/v1/Bills_state';
    await fetch(url,{
      method:method,
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({key:key,value:JSON.stringify(value)})
    });
  }catch(e){console.error(e);}
}

async function loadState(){
  setSyncBar('Syncing...','syncing');
  try{
    var s=await dbGet(syncKey());
    var a=await dbGet(amtKey());
    var o=await dbGet(owedKey());
    paid=s||{};
    customAmts=a||{};
    owedAmt=o||{tractor:4000,wellsfargo:563.83};
    setSyncBar('Synced &#10003;');
  }catch(e){
    setSyncBar('Offline — changes save locally','error');
    try{paid=JSON.parse(localStorage.getItem(syncKey())||'{}');}catch(e2){paid={};}
    try{customAmts=JSON.parse(localStorage.getItem(amtKey())||'{}');}catch(e2){customAmts={};}
    try{owedAmt=JSON.parse(localStorage.getItem(owedKey())||'{"tractor":4000,"wellsfargo":563.83}');}catch(e2){}
  }
}

async function saveState(){
  setSyncBar('Saving...','syncing');
  try{
    await dbSet(syncKey(),paid);
    await dbSet(amtKey(),customAmts);
    await dbSet(owedKey(),owedAmt);
    setSyncBar('Saved &#10003;');
  }catch(e){
    setSyncBar('Save failed','error');
    localStorage.setItem(syncKey(),JSON.stringify(paid));
    localStorage.setItem(amtKey(),JSON.stringify(customAmts));
    localStorage.setItem(owedKey(),JSON.stringify(owedAmt));
  }
}

function getAmt(b){return customAmts[b.id]!=null?customAmts[b.id]:b.amount;}
function fmt(n){if(n==null)return'—';return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function getStatus(day){
  var today=new Date();
  var isCurrentMonth=(curMonth===today.getMonth()&&curYear===today.getFullYear());
  if(!isCurrentMonth)return'normal';
  var todayDay=today.getDate();
  if(day<todayDay)return'overdue';
  if(day===todayDay)return'today';
  if(day-todayDay<=3)return'soon';
  return'normal';
}

async function togglePaid(id){
  paid[id]=!paid[id];
  if(paid[id]){
    var b=BILLS.find(function(x){return x.id===id;});
    var amt=getAmt(b);
    if(b.owed!=null&&amt!=null){owedAmt[id]=Math.max(0,(owedAmt[id]||0)-amt);}
  }
  render();
  await saveState();
}

async function setAmt(id){
  var b=BILLS.find(function(x){return x.id===id;});
  var cur=getAmt(b);
  var v=prompt('Enter monthly payment amount for '+b.name+':',cur!=null?cur:'');
  if(v!==null&&v.trim()!==''){
    var n=parseFloat(v.replace(/[$,]/g,''));
    if(!isNaN(n)){customAmts[id]=n;render();await saveState();}
  }
}

async function resetMonth(){
  if(!confirm('Reset all payments for this month?'))return;
  paid={};render();await saveState();
}

async function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  await loadState();render();
}

function render(){
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' '+curYear;

  var totalDue=0,totalPaid=0,paidCount=0;
  BILLS.forEach(function(b){
    var a=getAmt(b);
    if(a!=null)totalDue+=a;
    if(paid[b.id]){if(a!=null)totalPaid+=a;paidCount++;}
  });

  document.getElementById('sTotalDue').textContent=fmt(totalDue);
  document.getElementById('sPaid').textContent=fmt(totalPaid);
  document.getElementById('sLeft').textContent=fmt(totalDue-totalPaid);
  document.getElementById('sOwed').textContent=fmt((owedAmt.tractor||0)+(owedAmt.wellsfargo||0));

  var pct=Math.round(paidCount/BILLS.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=paidCount+' of '+BILLS.length+' paid';
  document.getElementById('pPct').textContent=pct+'%';

  var overdueList=[],soonList=[];
  BILLS.forEach(function(b){
    if(paid[b.id])return;
    var s=getStatus(b.day);
    if(s==='overdue')overdueList.push(b);
    if(s==='soon'||s==='today')soonList.push(b);
  });

  var alertArea=document.getElementById('alertArea');
  alertArea.innerHTML='';
  if(overdueList.length>0){
    var d=document.createElement('div');
    d.className='alert-overdue';
    d.innerHTML='&#9888;&#65039; <strong>Past due — pay now!</strong>';
    overdueList.forEach(function(b){
      d.innerHTML+='<div class="alert-item">&#8226; '+b.name+(getAmt(b)!=null?' — '+fmt(getAmt(b)):'')+'</div>';
    });
    alertArea.appendChild(d);
  }
  if(soonList.length>0){
    var d2=document.createElement('div');
    d2.className='alert-soon';
    d2.innerHTML='&#128277; <strong>Coming up soon</strong>';
    soonList.forEach(function(b){
      var s=getStatus(b.day);
      var today=new Date().getDate();
      var label=s==='today'?'due TODAY':'due in '+(b.day-today)+' day'+(b.day-today===1?'':'s');
      d2.innerHTML+='<div class="alert-item">&#8226; '+b.name+' — '+label+(getAmt(b)!=null?' ('+fmt(getAmt(b))+')':'')+'</div>';
    });
    alertArea.appendChild(d2);
  }

  var grouped={};
  BILLS.forEach(function(b){if(!grouped[b.day])grouped[b.day]=[];grouped[b.day].push(b);});
  var ord={1:'1st',7:'7th',13:'13th',14:'14th',18:'18th',29:'29th'};
  var list=document.getElementById('billList');
  list.innerHTML='';

  Object.keys(grouped).sort(function(a,b){return a-b;}).forEach(function(day){
    var groupStatus='normal';
    grouped[day].forEach(function(b){
      if(!paid[b.id]){
        var s=getStatus(b.day);
        if(s==='overdue'||s==='today')groupStatus='overdue';
        else if(s==='soon'&&groupStatus!=='overdue')groupStatus='soon';
      }
    });
    var grp=document.createElement('div');
    grp.className='day-group';
    var dotClass='day-dot'+(groupStatus==='overdue'?' overdue':groupStatus==='soon'?' soon':'');
    grp.innerHTML='<div class="day-label"><span class="'+dotClass+'"></span>Due '+ord[day]+' of the month</div>';

    grouped[day].forEach(function(b){
      var isPaid=!!paid[b.id];
      var status=isPaid?'paid':getStatus(b.day);
      var amt=getAmt(b);
      var owed=b.owed!=null?owedAmt[b.id]:null;

      var statusTag='';
      if(!isPaid){
        if(status==='overdue')statusTag='<span class="status-tag tag-overdue">&#9888; Past due</span>';
        else if(status==='today')statusTag='<span class="status-tag tag-today">&#128280; Due today</span>';
        else if(status==='soon')statusTag='<span class="status-tag tag-soon">&#128994; Due soon</span>';
      }

      var amtHtml=amt!=null
        ?'<div class="bill-amt'+(b.approx?' approx':'')+'">'+( b.approx?'~':'')+fmt(amt)+'</div>'
        :'<button class="set-btn" onclick="setAmt(\''+b.id+'\')">Set amount</button>';
      var owedHtml=owed!=null?'<div><span class="owed-tag">Balance owed: '+fmt(owed)+'</span></div>':'';
      var noteHtml=b.note?'<div class="bill-sub">'+b.note+'</div>':'';

      var rowClass='bill-row';
      if(isPaid)rowClass+=' paid';
      else if(status==='overdue')rowClass+=' overdue';
      else if(status==='today')rowClass+=' today';
      else if(status==='soon')rowClass+=' soon';

      var row=document.createElement('div');
      row.className=rowClass;
      row.innerHTML=
        '<button class="check '+(isPaid?'done':'')+'" onclick="togglePaid(\''+b.id+'\')" aria-label="'+(isPaid?'Mark unpaid':'Mark paid')+'">'+(isPaid?'&#10003;':'')+'</button>'+
        '<div style="font-size:20px;flex-shrink:0">'+b.icon+'</div>'+
        '<div class="bill-info"><div class="bill-name">'+b.name+'</div>'+noteHtml+statusTag+owedHtml+'</div>'+
        amtHtml;
      grp.appendChild(row);
    });
    list.appendChild(grp);
  });
}

loadState().then(function(){render();});
setInterval(function(){loadState().then(function(){render();});},30000);
</script>
</body>
</html>
